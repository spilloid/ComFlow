name: Publish image to GHCR

# Builds and pushes the single ComFlow image to GitHub Container Registry.
# - push to main      -> :main and :latest (+ :sha-xxxxxxx)
# - push a vX.Y.Z tag -> :X.Y.Z, :X.Y, :latest
# - manual run        -> via the Actions tab (workflow_dispatch)

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # ghcr requires a lowercase path; hardcoded to avoid repo-name casing issues.
  IMAGE: ghcr.io/spillers-technology/comflow

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # GHCR_TOKEN is a personal token with write:packages. It's used because the
      # package was first created via a local push (so it isn't auto-linked for
      # the Actions GITHUB_TOKEN). To switch back to GITHUB_TOKEN, grant this repo
      # Write access under the package's "Manage Actions access" settings.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.release
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
